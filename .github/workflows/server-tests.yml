name: Server Tests

on:
  push:
    branches: [ 'dev', 'main' ]
    paths:
      - 'server/**'

jobs:
  test-server:
    name: Run server tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (server)
        working-directory: server
        # use `npm install` because `npm ci` fails when package.json and lockfile
        # are not in sync (this repo currently has mismatched lockfile versions).
        run: npm install

      - name: Run server tests
        working-directory: server
        env:
          CI: true
        run: npm test
