name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Prepare environment
        # comprobar node y npm
        run: |
          node --version
          npm --version

      - name: Install MongoDB (server) and start service
        # instalar MongoDB local para los tests
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y gnupg ca-certificates curl
          curl -fsSL https://www.mongodb.org/static/pgp/server-6.0.asc | sudo gpg --dearmor -o /usr/share/keyrings/mongodb-server-6.gpg
          # usar repo 'jammy' compatible con el runner
          echo "deb [signed-by=/usr/share/keyrings/mongodb-server-6.gpg] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/6.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-6.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-org
          # iniciar mongod
          sudo systemctl enable --now mongod || sudo service mongod start || true
          # esperar a que esté listo
          for i in {1..10}; do
            nc -z 127.0.0.1 27017 && break || sleep 1
          done


      - name: Install server deps
        run: |
          cd server
          npm install

      - name: Run server unit tests
        run: |
          cd server
          npm test
        env:
          TEST_MONGO_URI: 'mongodb://127.0.0.1:27017'

