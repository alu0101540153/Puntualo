name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system libs for mongodb-memory-server
        # Some ubuntu images don't include the older libssl needed by
        # mongodb-memory-server prebuilt binaries. Try installing it.
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl1.1 || true

      - name: (Optional) Start system MongoDB if available
        # If the runner provides system mongodb via apt, starting it here
        # can allow tests to connect using TEST_MONGO_URI. This step is
        # best-effort and won't fail the job if it can't start.
        run: |
          if command -v mongod >/dev/null 2>&1; then
            sudo systemctl start mongod || sudo service mongod start || true
          fi

      - name: Install server deps
        run: |
          cd server
          npm ci

      - name: Run server unit tests
        run: |
          cd server
          npm test

